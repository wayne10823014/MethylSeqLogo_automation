<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8">
    <title>LogoJS 序列标志</title>
    <!-- 加载 LogoJS 库 -->
    <script src="logojs-package/dist/bundle.js" type="text/javascript"></script>
  </head>
  <body>
    <!-- 用于显示 DNA Logo 的容器 -->
    <div id="logo" style="width:500px; height:200px;"></div>

    <!-- JavaScript 代码 -->
    <script type="text/javascript">
      // 从 ppm.json 加载 PPM 数据
      fetch('ppm.json')
        .then(response => response.json())
        .then(ppmData => {
          // 使用 LogoJS 嵌入 DNA 序列标志
          logojs.embedDNALogo(document.getElementById("logo"), { ppm: ppmData });
        })
        .catch(error => console.error('加载 PPM 数据出错:', error));
    </script>
  </body>
</html>
